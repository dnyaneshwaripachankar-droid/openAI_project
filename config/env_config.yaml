#base_config.yaml

# Environment Configuration File

environment:
  name: CustomEnv
  version: v1

# Grid / World settings
world:
  width: 5
  height: 5
  start_position: [0, 0]
  goal_position: [4, 4]

# Rewards
rewards:
  goal: 10
  step: -1
  obstacle: -5

# Obstacles (optional)
obstacles:
  positions:
    - [1, 1]
    - [2, 2]
    - [3, 1]

# Agent settings
agent:
  type: simple
  max_steps: 50

# Action space
actions:
  up: 0
  down: 1
  left: 2
  right: 3

# Observation space
observation:
  type: grid